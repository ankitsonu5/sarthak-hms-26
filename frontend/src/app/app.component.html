<!-- Auth pages: no header, full-screen -->
<ng-container *ngIf="isAuthPage; else dashboardLayout">
  <router-outlet></router-outlet>
</ng-container>

<!-- Dashboard pages: header + content -->
<ng-template #dashboardLayout>
  <div class="min-h-screen bg-[var(--hms-surface-muted)]">
    <header class="bg-[var(--hms-primary)] text-white shadow-md sticky top-0 z-50">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg bg-white/20 flex items-center justify-center font-bold text-sm">H</div>
          <h1 class="text-lg font-semibold hidden sm:block">{{ title }}</h1>
        </div>

        <div class="flex items-center gap-4">
          <!-- User Info -->
          <div *ngIf="auth.user" class="hidden sm:flex items-center gap-2 text-sm">
            <div class="w-8 h-8 rounded-full bg-white/20 flex items-center justify-center text-xs font-medium">
              {{ auth.user.full_name.charAt(0) || 'U' }}
            </div>
            <div class="leading-tight">
              <p class="font-medium text-sm">{{ auth.user.full_name }}</p>
              <p class="text-xs text-white/70">{{ auth.user.role_name }}</p>
            </div>
          </div>

          <!-- Theme Selector -->
          <select
            class="bg-white/10 border border-white/20 rounded-lg px-2 py-1.5 text-xs outline-none cursor-pointer"
            [value]="theme.getCurrentTheme()"
            (change)="onThemeChange($any($event.target).value)">
            <option *ngFor="let t of theme.getAvailableThemes()" [value]="t" class="text-slate-800">
              {{ t }}
            </option>
          </select>

          <!-- Logout -->
          <button (click)="logout()"
                  class="px-3 py-1.5 bg-white/10 hover:bg-white/20 border border-white/20 rounded-lg text-xs font-medium transition-colors">
            Logout
          </button>
        </div>
      </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
      <router-outlet></router-outlet>
    </main>
  </div>
</ng-template>
